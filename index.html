<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>럭키비키 가계부 ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --pink:#ff85b3; --pink-l:#ffd6e8; --pink-ll:#fff0f7;
      --lav:#c39bd3;  --lav-l:#ede0f5;
      --mint:#7bdcb5; --mint-l:#d4f5eb;
      --yel:#ffd93d;  --yel-l:#fff8d6;
      --sky:#74c7f0;  --sky-l:#ddf3ff;
      --text:#5c3a6b; --muted:#b39fc2;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nanum Gothic',sans-serif;background:linear-gradient(135deg,#ffeaf5 0%,#f5eaff 40%,#eaf5ff 100%);background-attachment:fixed;color:var(--text);min-height:100vh;}
    body::before{content:'✨ ⭐ 🌟 ✨ 💫 ⭐ ✨ 🌟 💫 ✨ ⭐ 🌟';position:fixed;top:0;left:0;right:0;font-size:1.1rem;letter-spacing:2.2rem;opacity:.18;padding:6px 0;white-space:nowrap;overflow:hidden;pointer-events:none;z-index:0;}

    /* LOADING */
    #loadingOverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,240,250,.88);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;flex-direction:column;font-family:'Jua',sans-serif;color:#c060a0;font-size:1.1rem;}
    #loadingOverlay .spin{font-size:2.5rem;margin-bottom:14px;display:inline-block;animation:spin 1.2s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* HEADER */
    header{background:linear-gradient(90deg,#ffb3d1,#d4aaff 50%,#a8d8ff);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(255,133,179,.35);position:relative;z-index:10;}
    header h1{font-family:'Jua',sans-serif;font-size:1.6rem;color:#fff;text-shadow:2px 2px 0 #e066a0,0 0 20px rgba(255,255,255,.6);}
    .month-nav{display:flex;align-items:center;gap:10px;}
    .month-nav button{background:rgba(255,255,255,.45);border:2px solid rgba(255,255,255,.7);color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px);}
    .month-nav button:hover{background:rgba(255,255,255,.65);transform:scale(1.12);}
    .month-nav span{font-family:'Jua',sans-serif;font-size:1.05rem;color:#fff;text-shadow:1px 1px 0 #c060a0;min-width:120px;text-align:center;}

    /* TAB NAV */
    .tab-nav{display:flex;gap:0;padding:0 24px;position:relative;z-index:5;margin-top:0;background:rgba(255,255,255,.5);backdrop-filter:blur(8px);border-bottom:2px solid var(--pink-l);}
    .tab-nav button{font-family:'Jua',sans-serif;font-size:.92rem;padding:12px 22px;border:none;background:transparent;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;letter-spacing:.03em;}
    .tab-nav button.active{color:#d63386;border-bottom-color:#ff85b3;}
    .tab-nav button:hover:not(.active){color:var(--text);}

    /* SUMMARY */
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:20px 24px 0;position:relative;z-index:1;}
    .s-card{border-radius:20px;padding:16px 20px;position:relative;overflow:hidden;box-shadow:0 4px 18px rgba(180,100,200,.15),inset 0 1px 0 rgba(255,255,255,.8);}
    .s-card.income{background:linear-gradient(135deg,#fff0fa,#ffd6ee);border:2px solid #ffb8d9;}
    .s-card.expense{background:linear-gradient(135deg,#f5eaff,#e8d5ff);border:2px solid #d4aaff;}
    .s-card.balance{background:linear-gradient(135deg,#eaffef,#d5f5ff);border:2px solid #a8e6cf;}
    .s-card .label{font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase;}
    .s-card .s-icon{font-size:1.2rem;margin-bottom:2px;display:block;}
    .s-card .amount{font-family:'Jua',sans-serif;font-size:1.3rem;}
    .s-card.income .amount{color:#d63386;}
    .s-card.expense .amount{color:#8e44c9;}
    .s-card.balance .amount{color:#1a9e6b;}

    /* TAB PANELS */
    .tab-panel{display:none;position:relative;z-index:1;}
    .tab-panel.active{display:block;}

    /* MAIN GRID (가계부 탭) */
    .main{display:grid;grid-template-columns:360px 1fr;gap:20px;padding:20px 24px;}

    /* CARD */
    .card{background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-radius:24px;padding:22px;border:2px solid rgba(255,180,220,.45);box-shadow:0 6px 28px rgba(200,130,230,.13),inset 0 1px 0 rgba(255,255,255,.9);}
    .card h2{font-family:'Jua',sans-serif;font-size:1rem;color:#c060a0;margin-bottom:16px;display:flex;align-items:center;gap:6px;}
    .card h2::before{content:'✦';color:var(--yel);}
    .card h2::after{content:'✦';color:var(--pink);}

    /* FORM */
    form .field{margin-bottom:12px;}
    form label{display:block;font-size:.78rem;font-weight:800;color:#b06abf;margin-bottom:5px;}
    form input,form select{width:100%;padding:10px 14px;border:2px solid #f0c0de;border-radius:14px;font-size:.9rem;font-family:'Nanum Gothic',sans-serif;color:var(--text);background:rgba(255,240,250,.6);transition:all .2s;}
    form input:focus,form select:focus{outline:none;border-color:var(--pink);background:#fff;box-shadow:0 0 0 3px rgba(255,133,179,.2);}
    form input::placeholder{color:#d4a8c7;}
    .type-toggle{display:flex;gap:8px;margin-bottom:14px;background:var(--pink-ll);padding:4px;border-radius:16px;border:2px solid var(--pink-l);}
    .type-toggle button{flex:1;padding:9px;border:none;border-radius:12px;background:transparent;font-size:.88rem;font-family:'Jua',sans-serif;cursor:pointer;color:var(--muted);transition:all .25s;}
    .type-toggle button.active-income{background:linear-gradient(135deg,#ff85b3,#ff4d94);color:#fff;box-shadow:0 3px 12px rgba(255,100,160,.45);transform:scale(1.03);}
    .type-toggle button.active-expense{background:linear-gradient(135deg,#c39bd3,#9b59b6);color:#fff;box-shadow:0 3px 12px rgba(180,100,210,.45);transform:scale(1.03);}
    .btn-add{width:100%;padding:12px;background:linear-gradient(135deg,#ff85b3,#d4aaff);color:#fff;border:none;border-radius:16px;font-size:1rem;font-family:'Jua',sans-serif;cursor:pointer;margin-top:6px;letter-spacing:.05em;box-shadow:0 4px 18px rgba(255,100,180,.4);transition:all .2s;}
    .btn-add:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(255,100,180,.55);}
    .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .filter-tabs{display:flex;gap:6px;}
    .filter-tabs button{padding:5px 14px;border:2px solid var(--pink-l);border-radius:20px;background:#fff;font-size:.78rem;font-family:'Jua',sans-serif;cursor:pointer;color:var(--muted);transition:all .2s;}
    .filter-tabs button.active{background:linear-gradient(135deg,#ff85b3,#d4aaff);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(255,100,200,.35);}
    .transaction-list{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow-y:auto;padding-right:2px;}
    .transaction-list::-webkit-scrollbar{width:5px;}
    .transaction-list::-webkit-scrollbar-track{background:var(--pink-ll);border-radius:10px;}
    .transaction-list::-webkit-scrollbar-thumb{background:var(--pink-l);border-radius:10px;}
    .tx-item{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:16px;border:2px solid transparent;background:#fff;transition:all .2s;box-shadow:0 2px 10px rgba(200,150,230,.1);}
    .tx-item:hover{transform:translateX(3px);box-shadow:0 4px 18px rgba(200,150,230,.22);}
    .tx-item.income-item{border-color:#ffd6e8;background:linear-gradient(90deg,#fff8fc,#fff);}
    .tx-item.expense-item{border-color:#e8d5ff;background:linear-gradient(90deg,#fdf8ff,#fff);}
    .tx-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;}
    .tx-icon.income{background:linear-gradient(135deg,#ffd6e8,#ffb3d1);box-shadow:0 2px 8px rgba(255,133,179,.3);}
    .tx-icon.expense{background:linear-gradient(135deg,#ede0f5,#d4aaff);box-shadow:0 2px 8px rgba(180,130,220,.3);}
    .tx-info{flex:1;min-width:0;}
    .tx-info .tx-desc{font-size:.88rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
    .tx-info .tx-meta{font-size:.73rem;color:var(--muted);margin-top:3px;}
    .tx-amount{font-family:'Jua',sans-serif;font-size:.95rem;flex-shrink:0;}
    .tx-amount.income{color:#d63386;}
    .tx-amount.expense{color:#8e44c9;}
    .tx-delete{background:#fff0f5;border:1.5px solid #ffc0d8;cursor:pointer;color:#e05090;font-size:.8rem;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-weight:900;}
    .tx-delete:hover{background:#ff4d94;border-color:#ff4d94;color:#fff;transform:scale(1.15) rotate(90deg);box-shadow:0 3px 10px rgba(255,77,148,.4);}
    .empty-state{text-align:center;padding:48px 0;color:var(--muted);font-size:.9rem;}
    .empty-state .empty-icon{font-size:3rem;display:block;margin-bottom:10px;}
    .category-badge{display:inline-block;background:linear-gradient(135deg,#ffd6e8,#e8d5ff);color:#b06abf;border-radius:20px;padding:1px 8px;font-size:.68rem;font-weight:800;margin-left:5px;vertical-align:middle;}

    /* ── BUDGET TAB ── */
    .budget-wrap{padding:20px 24px;}
    .budget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
    .budget-item{background:rgba(255,255,255,.85);border-radius:18px;padding:16px 18px;border:2px solid var(--pink-l);box-shadow:0 3px 14px rgba(200,130,230,.1);}
    .budget-item .b-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .budget-item .b-cat{font-weight:800;font-size:.9rem;display:flex;align-items:center;gap:6px;}
    .budget-item .b-spent{font-family:'Jua',sans-serif;font-size:.85rem;color:var(--muted);}
    .b-input-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .b-input-row input{flex:1;padding:7px 12px;border:2px solid #f0c0de;border-radius:12px;font-size:.85rem;font-family:'Nanum Gothic',sans-serif;color:var(--text);background:rgba(255,240,250,.6);}
    .b-input-row input:focus{outline:none;border-color:var(--pink);background:#fff;}
    .b-input-row span{font-size:.8rem;color:var(--muted);white-space:nowrap;}
    .progress-bar{height:10px;background:#f0e8f8;border-radius:10px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:10px;transition:width .4s ease;}
    .progress-fill.ok{background:linear-gradient(90deg,#7bdcb5,#4ecdc4);}
    .progress-fill.warn{background:linear-gradient(90deg,#ffd93d,#ffaa00);}
    .progress-fill.over{background:linear-gradient(90deg,#ff85b3,#ff4d94);}
    .b-labels{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-top:5px;}
    .btn-save-budget{background:linear-gradient(135deg,#ff85b3,#d4aaff);color:#fff;border:none;border-radius:14px;padding:10px 22px;font-family:'Jua',sans-serif;font-size:.95rem;cursor:pointer;box-shadow:0 4px 14px rgba(255,100,180,.35);transition:all .2s;margin-top:16px;}
    .btn-save-budget:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(255,100,180,.5);}
    .budget-total-card{background:linear-gradient(135deg,#fff0fa,#ede0f5);border:2px solid #d4aaff;border-radius:20px;padding:16px 22px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    .budget-total-card .bt-item{text-align:center;}
    .budget-total-card .bt-label{font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:4px;}
    .budget-total-card .bt-val{font-family:'Jua',sans-serif;font-size:1.1rem;}

    /* ── SETTLEMENT TAB ── */
    .settlement-wrap{padding:20px 24px;}
    .settle-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
    .settle-card{background:rgba(255,255,255,.85);border-radius:20px;padding:18px 20px;border:2px solid var(--pink-l);box-shadow:0 3px 14px rgba(200,130,230,.1);}
    .settle-card h3{font-family:'Jua',sans-serif;font-size:.88rem;color:#c060a0;margin-bottom:12px;}
    .settle-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed #f0d0e8;}
    .settle-row:last-child{border-bottom:none;}
    .settle-row .sr-label{font-size:.82rem;color:var(--muted);}
    .settle-row .sr-val{font-family:'Jua',sans-serif;font-size:.9rem;}
    .sr-val.pos{color:#1a9e6b;}
    .sr-val.neg{color:#c53030;}
    .sr-val.pink{color:#d63386;}
    .sr-val.purple{color:#8e44c9;}
    .top3-list{display:flex;flex-direction:column;gap:8px;}
    .top3-item{display:flex;align-items:center;gap:10px;}
    .top3-rank{font-family:'Jua',sans-serif;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
    .r1{background:linear-gradient(135deg,#ffd93d,#ffaa00);color:#fff;}
    .r2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#fff;}
    .r3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff;}
    .top3-info{flex:1;}
    .top3-info .ti-cat{font-weight:800;font-size:.85rem;}
    .top3-info .ti-amt{font-family:'Jua',sans-serif;font-size:.88rem;color:#8e44c9;}
    .rate-bar-wrap{margin-top:6px;}
    .rate-bar{height:8px;background:#f0e8f8;border-radius:8px;overflow:hidden;}
    .rate-fill{height:100%;border-radius:8px;}

    /* ── CHART TAB ── */
    .chart-wrap{padding:20px 24px;}
    .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    .chart-card{background:rgba(255,255,255,.85);border-radius:24px;padding:22px;border:2px solid var(--pink-l);box-shadow:0 3px 14px rgba(200,130,230,.1);}
    .chart-card h3{font-family:'Jua',sans-serif;font-size:.95rem;color:#c060a0;margin-bottom:16px;display:flex;align-items:center;gap:6px;}
    .chart-card h3::before{content:'✦';color:var(--yel);}
    canvas{display:block;margin:0 auto;}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;justify-content:center;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text);}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .chart-empty{text-align:center;padding:60px 0;color:var(--muted);font-size:.9rem;}

    @media(max-width:720px){
      .main{grid-template-columns:1fr;}
      .summary{grid-template-columns:1fr 1fr;}
      .s-card.balance{grid-column:span 2;}
      .settle-grid{grid-template-columns:1fr;}
      .chart-grid{grid-template-columns:1fr;}
    }

    @keyframes popIn{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
    .pop{animation:popIn .28s ease;}
  </style>
</head>
<body>

<div id="loadingOverlay">
  <span class="spin">✨</span>
  <div>데이터 불러오는 중...</div>
</div>

<header>
  <h1>🍀 럭키비키 가계부 ✨</h1>
  <div class="month-nav">
    <button id="prevMonth">&#8249;</button>
    <span id="currentMonth"></span>
    <button id="nextMonth">&#8250;</button>
  </div>
</header>

<!-- TAB NAV -->
<nav class="tab-nav">
  <button class="active" onclick="switchTab('ledger',this)">📒 가계부</button>
  <button onclick="switchTab('budget',this)">🎯 예산</button>
  <button onclick="switchTab('settlement',this)">📋 결산</button>
  <button onclick="switchTab('charts',this)">📊 차트</button>
</nav>

<!-- SUMMARY (always visible) -->
<div class="summary">
  <div class="s-card income"><span class="s-icon">💗</span><div class="label">수입</div><div class="amount" id="totalIncome">₩0</div></div>
  <div class="s-card expense"><span class="s-icon">💜</span><div class="label">지출</div><div class="amount" id="totalExpense">₩0</div></div>
  <div class="s-card balance"><span class="s-icon">🌈</span><div class="label">잔액</div><div class="amount" id="totalBalance">₩0</div></div>
</div>

<!-- ══ TAB: 가계부 ══ -->
<div id="tab-ledger" class="tab-panel active">
  <div class="main">
    <div class="card">
      <h2>&nbsp;내역 추가하기&nbsp;</h2>
      <div class="type-toggle">
        <button id="btnIncome" class="active-income" onclick="setType('income')">💗 수입</button>
        <button id="btnExpense" onclick="setType('expense')">💜 지출</button>
      </div>
      <form id="txForm">
        <div class="field"><label>📅 날짜</label><input type="date" id="txDate" required /></div>
        <div class="field"><label>💰 금액 (원)</label><input type="number" id="txAmount" placeholder="얼마야~?" min="0" required /></div>
        <div class="field"><label>🏷️ 카테고리</label><select id="txCategory"></select></div>
        <div class="field"><label>📝 내용</label><input type="text" id="txDesc" placeholder="어디에 썼어~?" /></div>
        <button type="submit" class="btn-add">✨ 추가하기 ✨</button>
      </form>
    </div>
    <div class="card">
      <div class="list-header">
        <h2>&nbsp;거래 내역&nbsp;</h2>
        <div class="filter-tabs">
          <button class="active" onclick="setFilter('all',this)">🌟 전체</button>
          <button onclick="setFilter('income',this)">💗 수입</button>
          <button onclick="setFilter('expense',this)">💜 지출</button>
        </div>
      </div>
      <div class="transaction-list" id="txList"></div>
    </div>
  </div>
</div>

<!-- ══ TAB: 예산 ══ -->
<div id="tab-budget" class="tab-panel">
  <div class="budget-wrap">
    <div class="budget-total-card">
      <div class="bt-item"><div class="bt-label">총 예산</div><div class="bt-val" id="totalBudget" style="color:#8e44c9">₩0</div></div>
      <div class="bt-item"><div class="bt-label">총 지출</div><div class="bt-val" id="budgetSpent" style="color:#d63386">₩0</div></div>
      <div class="bt-item"><div class="bt-label">남은 예산</div><div class="bt-val" id="budgetLeft" style="color:#1a9e6b">₩0</div></div>
      <div class="bt-item"><div class="bt-label">예산 사용률</div><div class="bt-val" id="budgetRate" style="color:#c060a0">0%</div></div>
    </div>
    <div class="budget-grid" id="budgetGrid"></div>
    <div style="text-align:center"><button class="btn-save-budget" onclick="saveBudget()">💾 예산 저장하기 ✨</button></div>
  </div>
</div>

<!-- ══ TAB: 결산 ══ -->
<div id="tab-settlement" class="tab-panel">
  <div class="settlement-wrap">
    <div class="settle-grid">
      <div class="settle-card">
        <h3>📊 이번 달 결산</h3>
        <div id="settleSummary"></div>
      </div>
      <div class="settle-card">
        <h3>📅 지난달 대비</h3>
        <div id="settleCompare"></div>
      </div>
      <div class="settle-card">
        <h3>🏆 지출 TOP 3</h3>
        <div class="top3-list" id="settleTop3"></div>
      </div>
      <div class="settle-card">
        <h3>🎯 예산 달성률</h3>
        <div id="settleBudget"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ TAB: 차트 ══ -->
<div id="tab-charts" class="tab-panel">
  <div class="chart-wrap">
    <div class="chart-grid">
      <div class="chart-card">
        <h3>&nbsp;카테고리별 지출&nbsp;</h3>
        <div id="donutWrap"></div>
        <div class="legend" id="donutLegend"></div>
      </div>
      <div class="chart-card">
        <h3>&nbsp;6개월 수입·지출 추이&nbsp;</h3>
        <div id="barWrap"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Supabase 설정 ──
const SUPABASE_URL = 'https://ucnlidpsjpdjbaazhhua.supabase.co';
const SUPABASE_KEY = 'sb_publishable_zOUBGAQoHxpDiYwTV6E6Tw_k9TPWECr';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const INCOME_CATS = ['급여','부업','용돈','이자','투자','기타수입'];
const EXPENSE_CATS = ['식비','교통','주거','의료','쇼핑','문화/여가','통신','교육','저축','기타지출'];
const ICONS = {
  '급여':'💰','부업':'🛠️','용돈':'🎁','이자':'🏦','투자':'📈','기타수입':'💵',
  '식비':'🍽️','교통':'🚌','주거':'🏠','의료':'💊','쇼핑':'🛍️','문화/여가':'🎬','통신':'📱','교육':'📚','저축':'🏧','기타지출':'📦'
};
const CAT_COLORS = ['#ff85b3','#74c7f0','#7bdcb5','#ffd93d','#c39bd3','#ff6b6b','#4ecdc4','#a8e6cf','#95e1d3','#ffaa5e'];

let currentType='income', currentFilter='all', viewYear, viewMonth;

// 메모리 캐시 (Supabase에서 로드 후 유지)
let _txs = [];
let _budgets = {};

// ── Supabase 데이터 로드 ──
async function loadData() {
  const { data: txData, error: txErr } = await sb.from('transactions').select('*');
  if (txErr) { console.error('transactions 로드 실패:', txErr.message); }
  else { _txs = txData || []; }

  const { data: budgetData, error: budgetErr } = await sb.from('budgets').select('*');
  if (budgetErr) { console.error('budgets 로드 실패:', budgetErr.message); }
  else {
    _budgets = {};
    (budgetData || []).forEach(b => {
      const key = `${b.year}_${b.month}`;
      if (!_budgets[key]) _budgets[key] = {};
      _budgets[key][b.category] = b.amount;
    });
  }
}

function getTxs() { return _txs; }
function getBudgets() { return _budgets; }
function budgetKey() { return `${viewYear}_${viewMonth}`; }

function showLoading(on) {
  document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
}

async function init() {
  const now = new Date();
  viewYear = now.getFullYear(); viewMonth = now.getMonth();
  document.getElementById('txDate').value = now.toISOString().split('T')[0];
  document.getElementById('prevMonth').onclick = () => { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render(); };
  document.getElementById('nextMonth').onclick = () => { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render(); };
  document.getElementById('txForm').addEventListener('submit', addTx);
  updateCatOptions();

  showLoading(true);
  await loadData();
  showLoading(false);
  render();
}

function switchTab(name, el) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'budget') renderBudget();
  if (name === 'settlement') renderSettlement();
  if (name === 'charts') renderCharts();
}

function setType(t) {
  currentType = t;
  document.getElementById('btnIncome').className = t === 'income' ? 'active-income' : '';
  document.getElementById('btnExpense').className = t === 'expense' ? 'active-expense' : '';
  updateCatOptions();
}
function updateCatOptions() {
  const cats = currentType === 'income' ? INCOME_CATS : EXPENSE_CATS;
  document.getElementById('txCategory').innerHTML = cats.map(c => `<option>${c}</option>`).join('');
}
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); renderLedger();
}

function monthTxs() {
  return getTxs().filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });
}
function prevMonthTxs() {
  let y = viewYear, m = viewMonth - 1; if (m < 0) { m = 11; y--; }
  return getTxs().filter(t => { const d = new Date(t.date); return d.getFullYear() === y && d.getMonth() === m; });
}

async function addTx(e) {
  e.preventDefault();
  const date = document.getElementById('txDate').value;
  const amount = parseInt(document.getElementById('txAmount').value);
  const category = document.getElementById('txCategory').value;
  const description = document.getElementById('txDesc').value.trim() || category;
  if (!date || !amount) return;

  const { data, error } = await sb.from('transactions').insert([{
    date, amount, category, description, type: currentType
  }]).select().single();

  if (error) { console.error('추가 실패:', error.message); return; }
  _txs.push(data);
  document.getElementById('txAmount').value = '';
  document.getElementById('txDesc').value = '';
  render();
}

async function deleteTx(id) {
  const { error } = await sb.from('transactions').delete().eq('id', id);
  if (error) { console.error('삭제 실패:', error.message); return; }
  _txs = _txs.filter(t => t.id !== id);
  render();
}

function fmt(n) { return '₩' + n.toLocaleString('ko-KR'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  document.getElementById('currentMonth').textContent = `${viewYear}년 ${viewMonth + 1}월 ✨`;
  const txs = monthTxs();
  const inc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const exp = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  document.getElementById('totalIncome').textContent = fmt(inc);
  document.getElementById('totalExpense').textContent = fmt(exp);
  document.getElementById('totalBalance').textContent = fmt(inc - exp);
  renderLedger();
}

function renderLedger() {
  const txs = monthTxs();
  const filtered = currentFilter === 'all' ? txs : txs.filter(t => t.type === currentFilter);
  const sorted = [...filtered].sort((a, b) => String(b.date).localeCompare(String(a.date)) || b.id - a.id);
  const list = document.getElementById('txList');
  if (!sorted.length) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">🌸</span>아직 내역이 없어요~<br>럭키비키하게 추가해봐요! ✨</div>';
    return;
  }
  list.innerHTML = sorted.map(t => `
    <div class="tx-item ${t.type}-item pop">
      <div class="tx-icon ${t.type}">${ICONS[t.category] || (t.type === 'income' ? '💗' : '💜')}</div>
      <div class="tx-info">
        <div class="tx-desc">${esc(t.description)}<span class="category-badge">${esc(t.category)}</span></div>
        <div class="tx-meta">📅 ${t.date}</div>
      </div>
      <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
      <button class="tx-delete" onclick="deleteTx(${t.id})" title="삭제">✕</button>
    </div>`).join('');
}

/* ── Budget ── */
function renderBudget() {
  const txs = monthTxs();
  const budgets = getBudgets();
  const key = budgetKey();
  const monthBudgets = budgets[key] || {};

  let totalBudget = 0, totalSpent = 0;
  EXPENSE_CATS.forEach(c => { totalBudget += monthBudgets[c] || 0; });
  txs.filter(t => t.type === 'expense').forEach(t => totalSpent += t.amount);
  const left = totalBudget - totalSpent;
  const rate = totalBudget > 0 ? Math.round(totalSpent / totalBudget * 100) : 0;

  document.getElementById('totalBudget').textContent = fmt(totalBudget);
  document.getElementById('budgetSpent').textContent = fmt(totalSpent);
  document.getElementById('budgetLeft').textContent = fmt(left);
  document.getElementById('budgetRate').textContent = rate + '%';

  const grid = document.getElementById('budgetGrid');
  grid.innerHTML = EXPENSE_CATS.map((cat, i) => {
    const budget = monthBudgets[cat] || 0;
    const spent = txs.filter(t => t.type === 'expense' && t.category === cat).reduce((s, t) => s + t.amount, 0);
    const pct = budget > 0 ? Math.min(Math.round(spent / budget * 100), 100) : 0;
    const cls = pct >= 100 ? 'over' : pct >= 80 ? 'warn' : 'ok';
    return `
      <div class="budget-item">
        <div class="b-header">
          <div class="b-cat"><span>${ICONS[cat] || '📦'}</span>${cat}</div>
          <div class="b-spent">지출 ${fmt(spent)}</div>
        </div>
        <div class="b-input-row">
          <input type="number" id="b_${i}" value="${budget || ''}" placeholder="예산 입력" min="0" />
          <span>원</span>
        </div>
        <div class="progress-bar"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div>
        <div class="b-labels"><span>${fmt(spent)}</span><span>${budget ? fmt(budget) : '미설정'}</span></div>
      </div>`;
  }).join('');
}

async function saveBudget() {
  const [year, month] = budgetKey().split('_').map(Number);
  const rows = [];
  EXPENSE_CATS.forEach((cat, i) => {
    const val = parseInt(document.getElementById('b_' + i).value) || 0;
    if (val > 0) rows.push({ year, month, category: cat, amount: val });
  });

  await sb.from('budgets').delete().eq('year', year).eq('month', month);
  if (rows.length > 0) await sb.from('budgets').insert(rows);

  _budgets[budgetKey()] = {};
  rows.forEach(r => { _budgets[budgetKey()][r.category] = r.amount; });

  renderBudget();
  const btn = document.querySelector('.btn-save-budget');
  btn.textContent = '✅ 저장완료!';
  setTimeout(() => btn.textContent = '💾 예산 저장하기 ✨', 1500);
}

/* ── Settlement ── */
function renderSettlement() {
  const txs = monthTxs();
  const prev = prevMonthTxs();
  const inc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const exp = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const prevInc = prev.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const prevExp = prev.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const savingsRate = inc > 0 ? Math.round((inc - exp) / inc * 100) : 0;

  document.getElementById('settleSummary').innerHTML = `
    <div class="settle-row"><span class="sr-label">총 수입</span><span class="sr-val pink">${fmt(inc)}</span></div>
    <div class="settle-row"><span class="sr-label">총 지출</span><span class="sr-val purple">${fmt(exp)}</span></div>
    <div class="settle-row"><span class="sr-label">순이익</span><span class="sr-val ${inc - exp >= 0 ? 'pos' : 'neg'}">${fmt(inc - exp)}</span></div>
    <div class="settle-row"><span class="sr-label">저축률</span><span class="sr-val ${savingsRate >= 0 ? 'pos' : 'neg'}">${savingsRate}%</span></div>`;

  const incDiff = inc - prevInc, expDiff = exp - prevExp;
  document.getElementById('settleCompare').innerHTML = `
    <div class="settle-row"><span class="sr-label">수입 증감</span><span class="sr-val ${incDiff >= 0 ? 'pos' : 'neg'}">${incDiff >= 0 ? '+' : ''}${fmt(incDiff)}</span></div>
    <div class="settle-row"><span class="sr-label">지출 증감</span><span class="sr-val ${expDiff <= 0 ? 'pos' : 'neg'}">${expDiff >= 0 ? '+' : ''}${fmt(expDiff)}</span></div>
    <div class="settle-row"><span class="sr-label">지난달 수입</span><span class="sr-val pink">${fmt(prevInc)}</span></div>
    <div class="settle-row"><span class="sr-label">지난달 지출</span><span class="sr-val purple">${fmt(prevExp)}</span></div>`;

  const catSpend = EXPENSE_CATS.map(c => ({ cat: c, amt: txs.filter(t => t.type === 'expense' && t.category === c).reduce((s, t) => s + t.amount, 0) }))
    .filter(x => x.amt > 0).sort((a, b) => b.amt - a.amt);
  const top3 = catSpend.slice(0, 3);
  const maxAmt = top3[0]?.amt || 1;
  document.getElementById('settleTop3').innerHTML = top3.length ? top3.map((x, i) => `
    <div class="top3-item">
      <div class="top3-rank r${i + 1}">${i + 1}</div>
      <div class="top3-info">
        <div class="ti-cat">${ICONS[x.cat] || '📦'} ${x.cat}</div>
        <div class="ti-amt">${fmt(x.amt)}</div>
        <div class="rate-bar-wrap"><div class="rate-bar"><div class="rate-fill" style="width:${Math.round(x.amt / maxAmt * 100)}%;background:${CAT_COLORS[EXPENSE_CATS.indexOf(x.cat) % CAT_COLORS.length]}"></div></div></div>
      </div>
    </div>`).join('') : '<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:20px 0">지출 내역이 없어요 🌸</div>';

  const budgets = getBudgets()[budgetKey()] || {};
  const budgetRows = EXPENSE_CATS.map(cat => {
    const budget = budgets[cat] || 0; if (!budget) return '';
    const spent = txs.filter(t => t.type === 'expense' && t.category === cat).reduce((s, t) => s + t.amount, 0);
    const pct = Math.round(spent / budget * 100);
    const col = pct >= 100 ? '#ff85b3' : pct >= 80 ? '#ffd93d' : '#7bdcb5';
    return `<div class="settle-row">
      <span class="sr-label">${ICONS[cat] || '📦'} ${cat}</span>
      <span class="sr-val" style="color:${col}">${pct}% <span style="font-size:.72rem;color:var(--muted)">(${fmt(spent)}/${fmt(budget)})</span></span>
    </div>`;
  }).filter(Boolean).join('');
  document.getElementById('settleBudget').innerHTML = budgetRows || '<div style="color:var(--muted);font-size:.85rem;text-align:center;padding:20px 0">예산을 먼저 설정해줘요 🎯</div>';
}

/* ── Charts ── */
function renderCharts() { renderDonut(); renderBar(); }

function renderDonut() {
  const wrap = document.getElementById('donutWrap');
  const legend = document.getElementById('donutLegend');
  const txs = monthTxs().filter(t => t.type === 'expense');
  if (!txs.length) {
    wrap.innerHTML = '<div class="chart-empty">🌸 지출 내역이 없어요!</div>';
    legend.innerHTML = ''; return;
  }
  const catMap = {};
  txs.forEach(t => { catMap[t.category] = (catMap[t.category] || 0) + t.amount; });
  const total = Object.values(catMap).reduce((s, v) => s + v, 0);
  const entries = Object.entries(catMap).sort((a, b) => b[1] - a[1]);

  const size = 240, cx = size / 2, cy = size / 2, R = 90, r = 52;
  let angle = -Math.PI / 2;
  const arcs = entries.map(([cat, amt], i) => {
    const slice = amt / total * Math.PI * 2;
    const a1 = angle, a2 = angle + slice;
    const x1 = cx + R * Math.cos(a1), y1 = cy + R * Math.sin(a1);
    const x2 = cx + R * Math.cos(a2), y2 = cy + R * Math.sin(a2);
    const lf = slice > Math.PI ? 1 : 0;
    const ix1 = cx + r * Math.cos(a1), iy1 = cy + r * Math.sin(a1);
    const ix2 = cx + r * Math.cos(a2), iy2 = cy + r * Math.sin(a2);
    const col = CAT_COLORS[EXPENSE_CATS.indexOf(cat) % CAT_COLORS.length] || CAT_COLORS[i % CAT_COLORS.length];
    angle = a2;
    return `<path d="M${ix1},${iy1} L${x1},${y1} A${R},${R},0,${lf},1,${x2},${y2} L${ix2},${iy2} A${r},${r},0,${lf},0,${ix1},${iy1} Z" fill="${col}" opacity=".9"/>`;
  });

  wrap.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${arcs.join('')}
    <circle cx="${cx}" cy="${cy}" r="${r - 2}" fill="rgba(255,255,255,.9)"/>
    <text x="${cx}" y="${cy - 6}" text-anchor="middle" font-family="Jua,sans-serif" font-size="11" fill="#c060a0">총 지출</text>
    <text x="${cx}" y="${cy + 12}" text-anchor="middle" font-family="Jua,sans-serif" font-size="12" fill="#8e44c9">${fmt(total)}</text>
  </svg>`;

  legend.innerHTML = entries.map(([cat, amt], i) => {
    const col = CAT_COLORS[EXPENSE_CATS.indexOf(cat) % CAT_COLORS.length] || CAT_COLORS[i % CAT_COLORS.length];
    return `<div class="legend-item"><div class="legend-dot" style="background:${col}"></div>${cat} ${Math.round(amt / total * 100)}%</div>`;
  }).join('');
}

function renderBar() {
  const wrap = document.getElementById('barWrap');
  const months = [];
  for (let i = 5; i >= 0; i--) {
    let y = viewYear, m = viewMonth - i; if (m < 0) { m += 12; y--; }
    const txs = getTxs().filter(t => { const d = new Date(t.date); return d.getFullYear() === y && d.getMonth() === m; });
    const inc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const exp = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    months.push({ label: `${m + 1}월`, inc, exp });
  }
  const maxVal = Math.max(...months.flatMap(m => [m.inc, m.exp]), 1);
  const W = 420, H = 200, padL = 10, padB = 30, padT = 14, barW = 28, gap = 16;
  const groupW = barW * 2 + gap;
  const totalW = padL + months.length * (groupW + 24);
  const svgW = Math.max(W, totalW);

  const bars = months.map((m, i) => {
    const x = padL + i * (groupW + 24);
    const incH = Math.round((m.inc / maxVal) * (H - padB - padT));
    const expH = Math.round((m.exp / maxVal) * (H - padB - padT));
    const incY = H - padB - incH, expY = H - padB - expH;
    return `
      <rect x="${x}" y="${incY}" width="${barW}" height="${incH}" rx="6" fill="#ffb3d1" opacity=".85"/>
      <rect x="${x + barW + gap}" y="${expY}" width="${barW}" height="${expH}" rx="6" fill="#d4aaff" opacity=".85"/>
      <text x="${x + barW}" y="${H - padB + 16}" text-anchor="middle" font-family="Jua,sans-serif" font-size="10" fill="#b39fc2">${m.label}</text>`;
  }).join('');

  wrap.innerHTML = `<svg width="100%" viewBox="0 0 ${svgW} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H - padB}" stroke="#f0d0e8" stroke-width="1"/>
    <line x1="${padL}" y1="${H - padB}" x2="${svgW - 10}" y2="${H - padB}" stroke="#f0d0e8" stroke-width="1"/>
    ${bars}
    <rect x="${svgW - 100}" y="4" width="10" height="10" rx="3" fill="#ffb3d1"/>
    <text x="${svgW - 86}" y="13" font-family="Jua,sans-serif" font-size="9" fill="#b39fc2">수입</text>
    <rect x="${svgW - 60}" y="4" width="10" height="10" rx="3" fill="#d4aaff"/>
    <text x="${svgW - 46}" y="13" font-family="Jua,sans-serif" font-size="9" fill="#b39fc2">지출</text>
  </svg>`;
}

init();
</script>
</body>
</html>
